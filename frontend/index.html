<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="%VITE_APP_LOGO_URL%" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>%VITE_APP_TITLE%</title>
    <meta name="description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="author" content="Atoms" />

    <meta property="og:title" content="%VITE_APP_TITLE%" />
    <meta property="og:description" content="%VITE_APP_DESCRIPTION%" />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Capture errors that happen before modules run (import-time/runtime) and stash them
      window.addEventListener('error', function (e) {
        try {
          (window as any).__early_error = {
            message: e.message,
            filename: e.filename,
            lineno: e.lineno,
            colno: e.colno,
            stack: (e.error && e.error.stack) || null,
          };
        } catch (err) {
          /* ignore */
        }
      });
      window.addEventListener('unhandledrejection', function (ev) {
        try {
          (window as any).__early_promise_rejection = {
            reason: ev.reason && (ev.reason.message || String(ev.reason)),
            stack: ev.reason && ev.reason.stack ? ev.reason.stack : null,
          };
        } catch (err) {
          /* ignore */
        }
      });
      // debug badge removed
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
